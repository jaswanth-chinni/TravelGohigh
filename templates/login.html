{% extends "base.html" %}
{% block title %}Login – TravelGo{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="glass auth-card">
    <div class="text-center mb-4">
      <div style="font-size:3rem;margin-bottom:1rem;">✈️</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="text-secondary">Login to continue your journey</p>
    </div>

    <form action="/login" method="POST">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" style="border-radius:12px;padding:1rem;font-size:1rem;">
        Login →
      </button>
    </form>

    <p class="text-center mt-3 text-secondary" style="font-size:0.9rem;">
      Don't have an account? <a href="/register">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
